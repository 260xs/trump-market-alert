name: Market-Moving Public Figure Alert - stable monitor

run-name: "Market scan - ${{ github.event_name }} - run #${{ github.run_number }}"

on:
  workflow_dispatch:
    inputs:
      trigger_source:
        description: "manual, cron-job.org, or test"
        required: false
        default: "manual"
  schedule:
    - cron: "7-57/10 * * * *"

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: market-moving-public-figure-alert
  cancel-in-progress: false

env:
  RUN_ONCE: "true"
  LOG_LEVEL: INFO
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"
  SQLITE_PATH: data/market_alerts.sqlite3
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
  HEALTHCHECKS_URL: ${{ secrets.HEALTHCHECKS_URL }}
  ENABLE_LIVE_AUDIO: ${{ vars.ENABLE_LIVE_AUDIO }}
  ENABLE_PROVISIONAL_LIVE_ALERTS: ${{ vars.ENABLE_PROVISIONAL_LIVE_ALERTS }}
  LIVE_SAMPLE_SECONDS: ${{ vars.LIVE_SAMPLE_SECONDS }}

jobs:
  scan:
    name: Run market-moving public figure scan
    runs-on: ubuntu-latest
    timeout-minutes: 14

    steps:
      - name: Show trigger info
        run: |
          echo "Triggered by: ${GITHUB_EVENT_NAME}"
          echo "Run number: ${GITHUB_RUN_NUMBER}"
          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "UTC time: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Live audio enabled: ${ENABLE_LIVE_AUDIO:-false}"

      - name: Ping Healthchecks start
        if: env.HEALTHCHECKS_URL != ''
        run: |
          curl --fail --silent --show-error --max-time 15 --retry 2 "${HEALTHCHECKS_URL%/}/start" || true

      - name: Validate required secrets
        run: |
          test -n "${TELEGRAM_BOT_TOKEN}" || { echo "Missing TELEGRAM_BOT_TOKEN secret"; exit 1; }
          test -n "${TELEGRAM_CHAT_ID}" || { echo "Missing TELEGRAM_CHAT_ID secret"; exit 1; }

      - name: Check out project
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-live.txt

      - name: Restore SQLite database cache
        uses: actions/cache/restore@v4
        with:
          path: data
          key: market-alert-db-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            market-alert-db-${{ github.ref_name }}-

      - name: Install core dependencies
        run: |
          timeout 180s python -m pip install --upgrade pip setuptools wheel
          timeout 180s python -m pip install --requirement requirements.txt --prefer-binary --retries 5 --timeout 30
          python -m pip check

      - name: Install live audio dependencies
        if: vars.ENABLE_LIVE_AUDIO == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          timeout 300s python -m pip install --requirement requirements-live.txt --prefer-binary --retries 5 --timeout 60
          python -m pip check

      - name: Import check
        run: |
          python - <<'PY'
          import main
          import pipeline
          import scheduler
          print("Import check passed")
          PY

      - name: Run one scan
        run: |
          timeout --foreground 660s python main.py

      - name: Save SQLite database cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: market-alert-db-${{ github.ref_name }}-${{ github.run_id }}

      - name: Ping Healthchecks success
        if: success() && env.HEALTHCHECKS_URL != ''
        run: |
          curl --fail --silent --show-error --max-time 15 --retry 2 "${HEALTHCHECKS_URL}" || true

      - name: Ping Healthchecks failure
        if: failure() && env.HEALTHCHECKS_URL != ''
        run: |
          curl --fail --silent --show-error --max-time 15 --retry 2 -X POST --data-binary "GitHub Actions run failed: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" "${HEALTHCHECKS_URL%/}/fail" || true

      - name: Send Telegram failure alert
        if: failure()
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets missing; cannot send failure alert."
            exit 0
          fi
          MSG=$(printf '%s\n' \
            "🚨 Market alert workflow failed" \
            "" \
            "Workflow: ${GITHUB_WORKFLOW}" \
            "Trigger: ${GITHUB_EVENT_NAME}" \
            "Run: #${GITHUB_RUN_NUMBER}" \
            "Time UTC: $(date -u '+%Y-%m-%d %H:%M:%S')" \
            "" \
            "Logs:" \
            "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}")
          curl --fail --silent --show-error --max-time 20 --retry 2 \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" || true
