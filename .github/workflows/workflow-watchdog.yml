name: GitHub Actions Watchdog

run-name: "Actions watchdog - ${{ github.event_name }} - run #${{ github.run_number }}"

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: github-actions-watchdog
  cancel-in-progress: false

jobs:
  watchdog:
    name: Audit recent workflow failures without Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check recent workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          WATCHDOG_LOOKBACK_HOURS: "24"
        run: |
          set -euo pipefail

          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from datetime import datetime, timedelta, timezone
          from urllib import request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          lookback_hours = float(os.environ.get("WATCHDOG_LOOKBACK_HOURS", "24"))
          cutoff = datetime.now(timezone.utc) - timedelta(hours=lookback_hours)
          watched_workflows = {
              "Market-Moving Public Figure Alert",
              "Hourly Stock Research Scanner",
              "Stock Candidate Refresh",
              "Telegram Test",
              "System Health Check",
          }
          bad_conclusions = {"failure", "timed_out", "action_required"}

          api_url = f"https://api.github.com/repos/{repo}/actions/runs?per_page=50"
          api_request = request.Request(
              api_url,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with request.urlopen(api_request, timeout=20) as response:
              payload = json.loads(response.read().decode("utf-8"))

          failures = []
          for run in payload.get("workflow_runs", []):
              name = run.get("name") or ""
              conclusion = run.get("conclusion") or ""
              created_raw = run.get("created_at") or ""
              if name not in watched_workflows or conclusion not in bad_conclusions:
                  continue
              try:
                  created_at = datetime.fromisoformat(created_raw.replace("Z", "+00:00"))
              except ValueError:
                  continue
              if created_at < cutoff:
                  continue
              failures.append(
                  {
                      "name": name,
                      "conclusion": conclusion,
                      "created_at": created_at.strftime("%Y-%m-%d %H:%M UTC"),
                      "url": run.get("html_url") or f"https://github.com/{repo}/actions",
                  }
              )

          if not failures:
              print(f"No watched workflow failures in the last {lookback_hours:g} hours.")
              raise SystemExit(0)

          print(f"Found {len(failures)} watched workflow failure(s) in the last {lookback_hours:g} hours.")
          for item in failures[:20]:
              print(f"- {item['name']} ({item['conclusion']}) started {item['created_at']}: {item['url']}")
          raise SystemExit(1)
          PY
