name: Stock Candidate Refresh

run-name: "Candidate refresh - ${{ github.event_name }} - run #${{ github.run_number }}"

on:
  workflow_dispatch:
    inputs:
      trigger_source:
        description: "manual, external runner, or test"
        required: false
        default: "manual"

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: stock-candidate-refresh
  cancel-in-progress: false

env:
  LOG_LEVEL: INFO
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MARKET_DATA_RETRIES: "2"
  MARKET_DATA_RETRY_SLEEP_SECONDS: "1"

  STOCK_SQLITE_PATH: data/stocks.sqlite3

jobs:
  refresh:
    name: Rank top research candidates silently
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Show trigger info
        run: |
          echo "Triggered by: ${GITHUB_EVENT_NAME}"
          echo "Run number: ${GITHUB_RUN_NUMBER}"
          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "Branch: ${GITHUB_REF_NAME}"
          echo "UTC time: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Candidate refresh Telegram is disabled."

      - name: Check out project
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare data directory
        run: |
          mkdir -p data

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-stocks.txt

      - name: Restore stock database cache
        uses: actions/cache/restore@v5
        with:
          path: data
          key: stock-research-db-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            stock-research-db-${{ github.ref_name }}-

      - name: Install dependencies
        run: |
          timeout 240s python -m pip install --upgrade pip setuptools wheel
          timeout 240s python -m pip install \
            --requirement requirements.txt \
            --requirement requirements-stocks.txt \
            --prefer-binary \
            --retries 5 \
            --timeout 45
          python -m pip check

      - name: Import check
        run: |
          python - <<'PY'
          import stocks.scanner
          print("Stock candidate refresh import check passed")
          PY

      - name: Limit discovery workload
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          path = Path("config/stocks.yaml")
          cfg = yaml.safe_load(path.read_text(encoding="utf-8")) or {}
          settings = cfg.setdefault("settings", {})
          settings["max_scan_symbols_per_run"] = min(int(settings.get("max_scan_symbols_per_run", 45)), 45)
          settings["top_candidate_count"] = min(int(settings.get("top_candidate_count", 10)), 10)
          path.write_text(yaml.safe_dump(cfg, sort_keys=False), encoding="utf-8")
          print("Discovery limited to", settings["max_scan_symbols_per_run"], "symbols")
          PY

      - name: Refresh top stock candidates
        env:
          TELEGRAM_BOT_TOKEN: ""
          TELEGRAM_CHAT_ID: ""
        run: |
          timeout --foreground 1200s python -m stocks.scanner --mode discover

      - name: Save stock database cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: data
          key: stock-research-db-${{ github.ref_name }}-${{ github.run_id }}
