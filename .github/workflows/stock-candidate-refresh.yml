name: 3-Day Stock Candidate Refresh

run-name: "3-day candidate refresh - ${{ github.event_name }} - run #${{ github.run_number }}"

on:
  workflow_dispatch:
  schedule:
    - cron: "31 6 */3 * *"

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: stock-candidate-refresh
  cancel-in-progress: false

env:
  LOG_LEVEL: INFO
  PYTHONUNBUFFERED: "1"
  STOCK_SQLITE_PATH: data/stocks.sqlite3
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  refresh:
    name: Rank top research candidates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out project
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-stocks.txt

      - name: Restore stock database cache
        uses: actions/cache/restore@v4
        with:
          path: data
          key: stock-research-db-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            stock-research-db-${{ github.ref_name }}-

      - name: Install dependencies
        run: |
          timeout 240s python -m pip install --upgrade pip setuptools wheel
          timeout 240s python -m pip install --requirement requirements.txt --requirement requirements-stocks.txt --prefer-binary --retries 5 --timeout 45
          python -m pip check

      - name: Refresh top candidates
        run: |
          timeout --foreground 720s python -m stocks.scanner --mode discover

      - name: Save stock database cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: stock-research-db-${{ github.ref_name }}-${{ github.run_id }}
