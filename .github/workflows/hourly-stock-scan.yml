name: Hourly Stock Research Scanner

run-name: "Hourly stock scan - ${{ github.event_name }} - run #${{ github.run_number }}"

on:
  workflow_dispatch:
    inputs:
      trigger_source:
        description: "manual, schedule, external runner, or test"
        required: false
        default: "manual"

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: hourly-stock-research-scanner
  cancel-in-progress: false

env:
  LOG_LEVEL: INFO
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ENABLE_WORKFLOW_FAILURE_TELEGRAM: ${{ vars.ENABLE_WORKFLOW_FAILURE_TELEGRAM || 'false' }}

  STOCK_SQLITE_PATH: data/stocks.sqlite3

jobs:
  hourly-stock-scan:
    name: Scan priority stocks hourly
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Show trigger info
        run: |
          echo "Triggered by: ${GITHUB_EVENT_NAME}"
          echo "Run number: ${GITHUB_RUN_NUMBER}"
          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "Branch: ${GITHUB_REF_NAME}"
          echo "UTC time: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Workflow failure Telegram enabled: ${ENABLE_WORKFLOW_FAILURE_TELEGRAM}"

      - name: Validate Telegram secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          test -n "${TELEGRAM_BOT_TOKEN}" || { echo "Missing TELEGRAM_BOT_TOKEN secret"; exit 1; }
          test -n "${TELEGRAM_CHAT_ID}" || { echo "Missing TELEGRAM_CHAT_ID secret"; exit 1; }

          if ! echo "${TELEGRAM_CHAT_ID}" | grep -Eq '^-?[0-9]+$'; then
            echo "TELEGRAM_CHAT_ID must be a number."
            exit 1
          fi

          echo "Required Telegram secrets exist."

      - name: Check out project
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare data directory
        run: |
          mkdir -p data

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-stocks.txt

      - name: Restore stock database cache
        uses: actions/cache/restore@v5
        with:
          path: data
          key: stock-research-db-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            stock-research-db-${{ github.ref_name }}-

      - name: Install dependencies
        run: |
          timeout 240s python -m pip install --upgrade pip setuptools wheel
          timeout 240s python -m pip install \
            --requirement requirements.txt \
            --requirement requirements-stocks.txt \
            --prefer-binary \
            --retries 5 \
            --timeout 45
          python -m pip check

      - name: Import check
        run: |
          python - <<'PY'
          import stocks.scanner
          print("Stock scanner import check passed")
          PY

      - name: Run hourly stock scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          timeout --foreground 900s python -m stocks.scanner --mode hourly

      - name: Save stock database cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: data
          key: stock-research-db-${{ github.ref_name }}-${{ github.run_id }}

      - name: Send Telegram failure alert
        if: failure() && env.ENABLE_WORKFLOW_FAILURE_TELEGRAM == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets missing; cannot send failure alert."
            exit 0
          fi

          MSG="$(printf '%s\n' \
            "🚨 Hourly stock scanner failed" \
            "" \
            "Workflow: ${GITHUB_WORKFLOW}" \
            "Trigger: ${GITHUB_EVENT_NAME}" \
            "Run: #${GITHUB_RUN_NUMBER}" \
            "Branch: ${GITHUB_REF_NAME}" \
            "Time UTC: $(date -u '+%Y-%m-%d %H:%M:%S')" \
            "" \
            "Logs:" \
            "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}")"

          curl --fail --silent --show-error \
            --max-time 20 \
            --retry 2 \
            --retry-delay 5 \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "disable_web_page_preview=true" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" || true
