name: Trump Market Alert - 10 minute monitor

run-name: Trump scan - ${{ github.event_name }} - run #${{ github.run_number }}

on:
  workflow_dispatch:
  schedule:
    - cron: "7-57/10 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/monitor.yml"
      - "requirements.txt"
      - "config/**"
      - "trump_market_alert/**"

permissions:
  contents: read

concurrency:
  group: trump-market-alert-monitor
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  RUN_ONCE: "true"
  LOG_LEVEL: INFO
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"

jobs:
  check:
    name: Run market scan
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Show trigger
        run: |
          echo "Triggered by: $GITHUB_EVENT_NAME"
          echo "Run number: $GITHUB_RUN_NUMBER"

      - name: Check required secrets
        run: |
          test -n "$TELEGRAM_BOT_TOKEN" || { echo "Missing TELEGRAM_BOT_TOKEN secret"; exit 1; }
          test -n "$TELEGRAM_CHAT_ID" || { echo "Missing TELEGRAM_CHAT_ID secret"; exit 1; }
          test -n "$DATABASE_URL" || { echo "Missing DATABASE_URL secret"; exit 1; }

      - name: Check out project
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel

          for i in 1 2 3; do
            echo "Dependency install attempt $i"
            if python -m pip install --requirement requirements.txt; then
              echo "Dependencies installed successfully"
              exit 0
            fi

            if [ "$i" -eq 3 ]; then
              echo "Dependency install failed after 3 attempts"
              exit 1
            fi

            sleep $((i * 10))
          done

      - name: Import check
        run: |
          python - <<'PY'
          import trump_market_alert.runner
          print("Import check passed")
          PY

      - name: Run one alert check
        run: |
          timeout 420s python -m trump_market_alert.runner --once
