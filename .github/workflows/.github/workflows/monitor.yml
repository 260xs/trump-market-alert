name: Trump Market Alert - 5 minute monitor

on:
  schedule:
    - cron: "3-58/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: trump-market-alert-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RUN_ONCE: "true"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      LOG_LEVEL: INFO
    steps:
      - name: Check required secrets
        shell: bash
        run: |
          test -n "$TELEGRAM_BOT_TOKEN" || { echo "Missing TELEGRAM_BOT_TOKEN secret"; exit 1; }
          test -n "$TELEGRAM_CHAT_ID" || { echo "Missing TELEGRAM_CHAT_ID secret"; exit 1; }
          test -n "$DATABASE_URL" || { echo "Missing DATABASE_URL secret"; exit 1; }

      - name: Check out project
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Run one alert check
        run: python -m trump_market_alert.runner --once
