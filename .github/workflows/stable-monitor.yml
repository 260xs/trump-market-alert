name: Trump Market Alert - stable 10 minute monitor

run-name: "Trump scan - ${{ github.event_name }} - run #${{ github.run_number }}"

on:
  workflow_dispatch:
  schedule:
    - cron: "7-57/10 * * * *"

permissions:
  contents: read

concurrency:
  group: trump-market-alert-stable-monitor
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  RUN_ONCE: "true"
  LOG_LEVEL: INFO
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"

jobs:
  check:
    name: Run Trump market scan
    runs-on: ubuntu-latest
    timeout-minutes: 9

    steps:
      - name: Show trigger info
        run: |
          echo "Triggered by: ${GITHUB_EVENT_NAME}"
          echo "Run number: ${GITHUB_RUN_NUMBER}"
          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "Branch: ${GITHUB_REF_NAME}"
          echo "UTC time: $(date -u '+%Y-%m-%d %H:%M:%S')"

      - name: Validate required secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          test -n "${TELEGRAM_BOT_TOKEN}" || { echo "Missing TELEGRAM_BOT_TOKEN secret"; exit 1; }
          test -n "${TELEGRAM_CHAT_ID}" || { echo "Missing TELEGRAM_CHAT_ID secret"; exit 1; }
          test -n "${DATABASE_URL}" || { echo "Missing DATABASE_URL secret"; exit 1; }

      - name: Check out project
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          timeout 180s python -m pip install --upgrade pip setuptools wheel
          timeout 180s python -m pip install \
            --requirement requirements.txt \
            --prefer-binary \
            --retries 5 \
            --timeout 30
          python -m pip check

      - name: Import check
        run: |
          python - <<'PY'
          import trump_market_alert.runner
          print("Import check passed")
          PY

      - name: Run one alert check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          timeout --foreground 330s python -m trump_market_alert.runner --once

      - name: Send Telegram failure alert
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets are missing, so failure alert cannot be sent."
            exit 0
          fi

          MSG="$(cat <<EOF
🚨 Trump Market Alert workflow failed

Workflow: ${GITHUB_WORKFLOW}
Trigger: ${GITHUB_EVENT_NAME}
Run: #${GITHUB_RUN_NUMBER}
Branch: ${GITHUB_REF_NAME}
Time UTC: $(date -u '+%Y-%m-%d %H:%M:%S')

Check logs:
${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
EOF
          )"

          curl --fail --silent --show-error --max-time 20 --retry 2 --retry-delay 5 \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" || true
