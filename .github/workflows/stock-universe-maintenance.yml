name: Stock Universe Maintenance

run-name: "Stock universe maintenance - ${{ github.event_name }} - run #${{ github.run_number }}"

on:
  workflow_dispatch:
    inputs:
      provider_version:
        description: "Provider listing version or source timestamp"
        required: false
        default: "manual"

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: stock-universe-maintenance
  cancel-in-progress: false

env:
  LOG_LEVEL: INFO
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  STOCK_SQLITE_PATH: data/stocks.sqlite3

jobs:
  universe-maintenance:
    name: Silent universe and market-data quality dry run
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Show trigger info
        run: |
          echo "Triggered by: ${GITHUB_EVENT_NAME}"
          echo "Run number: ${GITHUB_RUN_NUMBER}"
          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "Branch: ${GITHUB_REF_NAME}"
          echo "UTC time: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Telegram is disabled for stock universe maintenance."
      - name: Check out project
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Prepare data directory
        run: mkdir -p data
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-stocks.txt
      - name: Install dependencies
        run: |
          timeout 240s python -m pip install --upgrade pip setuptools wheel
          timeout 240s python -m pip install \
            --requirement requirements.txt \
            --requirement requirements-stocks.txt \
            --prefer-binary \
            --retries 5 \
            --timeout 45
          python -m pip check
      - name: Import check
        run: |
          python - <<'PY'
          import stocks.universe_quality
          print("Stock universe maintenance import check passed")
          PY
      - name: Run Telegram-disabled universe dry run
        env:
          TELEGRAM_BOT_TOKEN: ""
          TELEGRAM_CHAT_ID: ""
        run: |
          timeout --foreground 900s python -m stocks.universe_quality \
            --sqlite-path "${STOCK_SQLITE_PATH}" \
            --report-path data/data_quality_report.json \
            --provider-version "${{ github.event.inputs.provider_version }}"
      - name: Upload data-quality report
        uses: actions/upload-artifact@v5
        with:
          name: stock-data-quality-report
          path: data/data_quality_report.json
          if-no-files-found: error
