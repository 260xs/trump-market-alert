name: System Health Check

run-name: "System health - ${{ github.event_name }} - run #${{ github.run_number }}"

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: system-health-check
  cancel-in-progress: false

env:
  LOG_LEVEL: INFO
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  health:
    name: Run imports, dependency checks, and tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Show trigger info
        run: |
          echo "Triggered by: ${GITHUB_EVENT_NAME}"
          echo "Run number: ${GITHUB_RUN_NUMBER}"
          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "Branch: ${GITHUB_REF_NAME}"
          echo "UTC time: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Manual-only system health check."

      - name: Check out project
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-stocks.txt
            requirements-dev.txt

      - name: Install test dependencies
        run: |
          timeout 240s python -m pip install --upgrade pip setuptools wheel
          timeout 300s python -m pip install \
            --requirement requirements.txt \
            --requirement requirements-stocks.txt \
            --requirement requirements-dev.txt \
            --prefer-binary \
            --retries 5 \
            --timeout 45
          python -m pip check

      - name: Import critical modules
        run: |
          python - <<'PY'
          import main
          import pipeline
          import scheduler
          import stocks.scanner
          print("Critical imports passed")
          PY

      - name: Run tests
        run: |
          python -m pytest -q
