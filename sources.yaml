# Public source configuration for Trump Market Alert.
# Keep this file free of secrets. Tokens and passwords must stay in GitHub Secrets.

version: 1

polling:
  # Ignore very old items so a new deployment does not alert on stale news.
  max_item_age_hours: 96

  # Database cleanup keeps the free Supabase database small over time.
  cleanup_raw_days: 180
  cleanup_runs_days: 45

  # Per-source network behavior.
  request_timeout_seconds: 20
  user_agent: "TrumpMarketAlert/1.0 (+public-source-monitor)"

truth_social:
  enabled: true
  accounts:
    - name: realDonaldTrump
      enabled: true
      platform: Truth Social
      profile_url: https://truthsocial.com/@realDonaldTrump
      # Public Truth Social/Mastodon-style API endpoint.
      api_url: https://truthsocial.com/api/v1/accounts/107780257626128497/statuses?exclude_replies=false&with_muted=true&limit=20
      limit: 20

rss:
  enabled: true
  feeds:
    # Fast broad market search.
    - name: Google News - Trump market fast
      enabled: true
      platform: Google News RSS
      limit: 25
      url: https://news.google.com/rss/search?q=Trump%20%28stock%20OR%20stocks%20OR%20market%20OR%20markets%20OR%20Wall%20Street%20OR%20Nasdaq%20OR%20Dow%20OR%20S%26P%20OR%20Fed%20OR%20rates%20OR%20inflation%20OR%20tariff%20OR%20tariffs%20OR%20Bitcoin%20OR%20crypto%20OR%20oil%20OR%20gold%20OR%20banks%29%20when%3A1d&hl=en-US&gl=US&ceid=US:en

    # Company, CEO, and brand monitoring.
    - name: Google News - Trump company CEO mentions
      enabled: true
      platform: Google News RSS
      limit: 25
      url: https://news.google.com/rss/search?q=Trump%20%28CEO%20OR%20Apple%20OR%20Nvidia%20OR%20Tesla%20OR%20Microsoft%20OR%20Google%20OR%20Alphabet%20OR%20Meta%20OR%20Amazon%20OR%20Dell%20OR%20Intel%20OR%20Boeing%20OR%20JPMorgan%20OR%20Bank%20of%20America%20OR%20Goldman%20Sachs%20OR%20Exxon%20OR%20Chevron%29%20when%3A2d&hl=en-US&gl=US&ceid=US:en

    # Captures news reporting on X/Twitter posts without scraping X.
    - name: Google News - Trump X market mentions
      enabled: true
      platform: Google News RSS
      limit: 25
      url: https://news.google.com/rss/search?q=%28Trump%20OR%20Donald%20Trump%20OR%20%40realDonaldTrump%29%20%28posted%20OR%20said%20OR%20wrote%20OR%20announced%29%20%28X%20OR%20Twitter%29%20%28stock%20OR%20market%20OR%20Bitcoin%20OR%20crypto%20OR%20tariff%20OR%20oil%20OR%20Fed%20OR%20bank%20OR%20company%20OR%20CEO%29%20when%3A2d&hl=en-US&gl=US&ceid=US:en

    # Speeches, interviews, press conferences, campaign events.
    - name: Google News - Trump live remarks markets
      enabled: true
      platform: Google News RSS
      limit: 25
      url: https://news.google.com/rss/search?q=Trump%20%28live%20OR%20speech%20OR%20interview%20OR%20press%20conference%20OR%20remarks%20OR%20rally%20OR%20campaign%20event%29%20%28stocks%20OR%20market%20OR%20economy%20OR%20tariffs%20OR%20crypto%20OR%20oil%20OR%20banks%20OR%20rates%20OR%20inflation%29%20when%3A1d&hl=en-US&gl=US&ceid=US:en

    # Truth Social reporting backup.
    - name: Google News - Truth Social Trump market
      enabled: true
      platform: Google News RSS
      limit: 20
      url: https://news.google.com/rss/search?q=Trump%20%22Truth%20Social%22%20%28stock%20OR%20market%20OR%20Bitcoin%20OR%20crypto%20OR%20company%20OR%20CEO%20OR%20tariff%20OR%20oil%20OR%20Fed%29%20when%3A2d&hl=en-US&gl=US&ceid=US:en

    # Official/public source feeds.
    - name: White House official feed
      enabled: true
      platform: White House RSS
      limit: 20
      url: https://www.whitehouse.gov/feed/

    - name: White House videos feed
      enabled: true
      platform: White House RSS
      limit: 20
      url: https://www.whitehouse.gov/videos/feed/

    - name: RSBN public feed
      enabled: true
      platform: RSBN RSS
      limit: 20
      url: https://www.rsbnetwork.com/feed/

youtube:
  enabled: true
  transcript_enabled: true
  transcript_max_age_hours: 96
  channels:
    - name: Donald J. Trump official YouTube
      enabled: true
      platform: YouTube RSS
      channel_id: UCAql2DyGU2un1Ei2nMYsqOA
      limit: 10

    - name: The White House YouTube
      enabled: true
      platform: YouTube RSS
      channel_id: UCYxRlFDqcWM4y7FfpiAN3KQ
      limit: 10

    - name: Right Side Broadcasting Network YouTube
      enabled: true
      platform: YouTube RSS
      channel_id: UCHqC-yWZ1kri4YzwRSt6RGQ
      limit: 10

x_api:
  # Disabled by default because X API access requires an official bearer token.
  # To enable later, add X_BEARER_TOKEN as a GitHub secret and set enabled: true.
  enabled: false
  max_results: 10
  queries:
    - '(from:realDonaldTrump OR from:TeamTrump OR from:TrumpWarRoom) (stock OR stocks OR market OR Bitcoin OR crypto OR tariff OR tariffs OR oil OR gold OR Fed OR rates OR bank OR economy OR CEO OR company) -is:retweet lang:en'
    - 'Donald Trump (stock OR stocks OR market OR Bitcoin OR crypto OR tariff OR tariffs OR oil OR gold OR Fed OR rates OR bank OR economy OR CEO OR company) -is:retweet lang:en'

live_audio:
  # Disabled in the normal free monitor. This requires heavier dependencies and is best added later.
  enabled: false
  seconds: 90
  model: tiny.en
  sources:
    - name: RSBN live page
      enabled: true
      platform: YouTube live page
      url: https://www.youtube.com/@RSBN/live

    - name: The White House live page
      enabled: true
      platform: YouTube live page
      url: https://www.youtube.com/@WhiteHouse/live
