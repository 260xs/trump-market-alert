name: Trump Market Alert - optional live audio sampler

on:
  workflow_dispatch:
  schedule:
    - cron: "7,27,47 * * * *"

permissions:
  contents: read

concurrency:
  group: trump-market-alert-live-audio
  cancel-in-progress: false

jobs:
  live-audio:
    if: ${{ vars.LIVE_AUDIO_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      LOG_LEVEL: INFO
      LIVE_AUDIO_ENABLED: "true"
      LIVE_AUDIO_SECONDS: ${{ vars.LIVE_AUDIO_SECONDS || '90' }}
      LIVE_AUDIO_MODEL: ${{ vars.LIVE_AUDIO_MODEL || 'tiny.en' }}
    steps:
      - name: Check required secrets
        shell: bash
        run: |
          test -n "$TELEGRAM_BOT_TOKEN" || { echo "Missing TELEGRAM_BOT_TOKEN secret"; exit 1; }
          test -n "$TELEGRAM_CHAT_ID" || { echo "Missing TELEGRAM_CHAT_ID secret"; exit 1; }
          test -n "$DATABASE_URL" || { echo "Missing DATABASE_URL secret"; exit 1; }

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install audio dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-audio.txt

      - name: Run live audio sample
        run: python -m trump_market_alert.runner --once --live-only
