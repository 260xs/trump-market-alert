# Entity and asset mapping for Trump Market Alert.
# The scanner uses aliases to detect market-related mentions, then maps them
# to tickers, crypto assets, commodities, sectors, or policy-sensitive assets.

version: 1

settings:
  min_alias_length: 3
  case_sensitive: false
  word_boundary_matching: true

market_keywords:
  - stock
  - stocks
  - market
  - markets
  - wall street
  - nasdaq
  - dow
  - s&p
  - crypto
  - bitcoin
  - ethereum
  - bank
  - banks
  - oil
  - gold
  - gas
  - tariff
  - tariffs
  - fed
  - federal reserve
  - interest rate
  - interest rates
  - inflation
  - recession
  - dollar
  - bond
  - treasury
  - company
  - companies
  - ceo
  - ipo
  - earnings
  - trade deal
  - china trade

entities:
  # Trump-linked public market entity
