blocked_ambiguous:
  - name: Marvel
    reason: Could mean Marvel Entertainment, Marvel content, or Marvell Technology. Do not map unless ticker MRVL or Marvell Technology is explicit.
    patterns: ["\\bMarvel\\b"]
  - name: X
    reason: Too ambiguous. Could mean Twitter/X, letter X, unknown variable, or another context.
    patterns: ["\\bX\\b"]
  - name: Meta
    reason: Meta alone can be a general word. Require Meta Platforms, Facebook, or ticker META.
    patterns: ["\\bmeta\\b"]
  - name: F
    reason: Ticker-only F is too ambiguous in speech and text. Require Ford by company name for alerts.
    patterns: ["\\bF\\b"]
  - name: CAT
    reason: Ticker-only CAT can mean the animal or ordinary word. Require Caterpillar by company name before mapping.
    patterns: ["\\bCAT\\b"]
  - name: ARM
    reason: ARM can be a body part or verb. Require Arm Holdings or explicit market context before mapping.
    patterns: ["\\bARM\\b"]
