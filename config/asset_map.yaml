blocked_ambiguous:
  - name: Marvel
    reason: Could mean Marvel Entertainment, Marvel character/content, or Marvell Technology. Do not map unless ticker MRVL or Marvell Technology is explicit.
    patterns: ["\\bMarvel\\b"]
  - name: X
    reason: Too ambiguous. Could mean Twitter/X, letter X, unknown variable, or other context.
    patterns: ["\\bX\\b"]
  - name: Meta
    reason: Meta alone can be a general word. Require Meta Platforms or Facebook.
    patterns: ["\\bmeta\\b"]
