rejected_or_unavailable:
  - id: fan_or_repost_accounts
    status: Rejected
    non_active_reason: Fan accounts, unattributed screenshots, anonymous reposts, and unverified clips are not legal original sources for urgent alerts.
  - id: paywalled_direct_quote_only_sources
    status: Rejected
    non_active_reason: Paywall bypassing is disallowed; use official originals or legally accessible reputable reporting with verifiable direct source context.
  - id: broad_country_leader_pages_without_asset_context
    status: Candidate
    non_active_reason: Government leaders can be market-moving, but broad political pages need direct-asset filters and official-source tests before activation.

source_platform_gaps:
  - platform: X official API
    status: Candidate
    non_active_reason: Requires X_BEARER_TOKEN and cursor/rate-limit tests. Do not infer ownership from reposts.
  - platform: YouTube transcripts
    status: Candidate
    non_active_reason: Requires stable video/channel ID handling, transcript timestamp validation, and duplicate segment tests.
  - platform: Government HTML pages
    status: Candidate
    non_active_reason: Several official sources are HTML without RSS; adapter tests are needed for selectors, timestamps, redirects, and stale-content behavior.
