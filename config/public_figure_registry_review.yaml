  scope: worldwide public-figure and official-source coverage review
  live_scanner_change: false
  telegram_disabled: true
  stock_scans_run: false
  workflow_dispatch_run: false
  notes:
    - Shadow registry only. These entries do not alter watchlist.yaml or config/watchlist_extra.yaml.
    - Active means identity, current role, official source, and market relevance were verified for coverage planning.
    - Candidate means plausible market relevance exists but the repo should not enable live collection until parser/source behavior is tested.

coverage_statuses:
  allowed: [Active, Candidate, Unavailable, Stale, Disabled, Rejected]
  non_active_reason_required: true

