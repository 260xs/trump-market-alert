unsupported_or_limited_platforms:
  - platform: X
    limitation: official API requires X_BEARER_TOKEN; no scraping or access bypass is allowed
  - platform: YouTube live audio
    limitation: heavy optional stack; provisional alerts must remain explicit and disabled unless intentionally configured
  - platform: Google News RSS
    limitation: aggregation only; usable for discovery and corroboration, not as high-confidence original quote source by itself
  - platform: public HTML pages
    limitation: parser stability and timestamp extraction vary by site

