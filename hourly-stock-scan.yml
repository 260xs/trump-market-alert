name: Hourly Stock Research Scanner

run-name: "Hourly stock scan - ${{ github.event_name }} - run #${{ github.run_number }}"

on:
  workflow_dispatch:
  schedule:
    - cron: "13 * * * *"

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: hourly-stock-research-scanner
  cancel-in-progress: false

env:
  LOG_LEVEL: INFO
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"
  STOCK_SQLITE_PATH: data/stocks.sqlite3
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  hourly-stock-scan:
    name: Scan priority stocks hourly
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Show trigger info
        run: |
          echo "Triggered by: ${GITHUB_EVENT_NAME}"
          echo "UTC time: $(date -u '+%Y-%m-%d %H:%M:%S')"

      - name: Validate Telegram secrets
        run: |
          test -n "${TELEGRAM_BOT_TOKEN}" || { echo "Missing TELEGRAM_BOT_TOKEN secret"; exit 1; }
          test -n "${TELEGRAM_CHAT_ID}" || { echo "Missing TELEGRAM_CHAT_ID secret"; exit 1; }

      - name: Check out project
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-stocks.txt

      - name: Restore stock database cache
        uses: actions/cache/restore@v4
        with:
          path: data
          key: stock-research-db-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            stock-research-db-${{ github.ref_name }}-

      - name: Install dependencies
        run: |
          timeout 240s python -m pip install --upgrade pip setuptools wheel
          timeout 240s python -m pip install --requirement requirements.txt --requirement requirements-stocks.txt --prefer-binary --retries 5 --timeout 45
          python -m pip check

      - name: Run hourly stock scanner
        run: |
          timeout --foreground 480s python -m stocks.scanner --mode hourly

      - name: Save stock database cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: stock-research-db-${{ github.ref_name }}-${{ github.run_id }}

      - name: Send Telegram failure alert
        if: failure()
        run: |
          MSG=$(printf '%s\n' \
            "🚨 Hourly stock scanner failed" \
            "Run: #${GITHUB_RUN_NUMBER}" \
            "Time UTC: $(date -u '+%Y-%m-%d %H:%M:%S')" \
            "Logs: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}")
          curl --fail --silent --show-error --max-time 20 --retry 2 \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" || true
